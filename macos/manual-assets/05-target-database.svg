<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Custom target database</title>
  <desc id="desc">Illustration of choosing catalog families, magnitude limits, and building a custom target database.</desc>
  <rect width="1280" height="760" fill="#0d1830"/>
  <rect x="78" y="62" width="1124" height="636" rx="28" fill="#f8fbff"/>
  <text x="122" y="128" fill="#1f5fbf" font-family="Aptos, Helvetica, Arial" font-size="36" font-weight="900">Create Your Custom Target Database</text>
  <g font-family="Aptos, Helvetica, Arial">
    <rect x="122" y="184" width="520" height="456" rx="18" fill="#edf5ff" stroke="#c9d6ea"/>
    <text x="154" y="234" fill="#244a7f" font-size="27" font-weight="900">Catalog Choices</text>
    <text x="154" y="284" fill="#10213a" font-size="20">☑ Messier and Caldwell</text>
    <text x="154" y="330" fill="#10213a" font-size="20">☑ OpenNGC deep-sky targets</text>
    <text x="154" y="376" fill="#10213a" font-size="20">☑ Bright star catalog</text>
    <text x="154" y="422" fill="#10213a" font-size="20">☑ Solar system feed</text>
    <rect x="154" y="494" width="250" height="54" rx="10" fill="#ffdc55"/><text x="279" y="529" text-anchor="middle" fill="#10213a" font-size="20" font-weight="900">Mark Ready</text>
    <rect x="694" y="184" width="362" height="456" rx="18" fill="#fff8da" stroke="#e9c95f"/>
    <text x="724" y="234" fill="#986f00" font-size="27" font-weight="900">Build Controls</text>
    <text x="724" y="292" fill="#10213a" font-size="20">Magnitude limit: 17</text>
    <text x="724" y="338" fill="#10213a" font-size="20">Scope: Northern / Southern / Global</text>
    <rect x="724" y="420" width="250" height="62" rx="12" fill="#1f5fbf"/><text x="849" y="459" text-anchor="middle" fill="#fff" font-size="22" font-weight="900">Build Catalog</text>
    <text x="724" y="535" fill="#536071" font-size="18">Saved into local SwiftData tables.</text>
  </g>
</svg>
