<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Review export and logs</title>
  <desc id="desc">Illustration of reviewing a plan, printing or exporting a report, and syncing entries to logs.</desc>
  <rect width="1280" height="760" fill="#10233e"/>
  <rect x="84" y="66" width="1112" height="628" rx="28" fill="#f8fbff"/>
  <text x="126" y="132" fill="#1f5fbf" font-family="Aptos, Helvetica, Arial" font-size="36" font-weight="900">Review, Export, and Logs</text>
  <g font-family="Aptos, Helvetica, Arial">
    <rect x="126" y="188" width="470" height="450" rx="18" fill="#edf5ff" stroke="#c9d6ea"/>
    <text x="156" y="238" fill="#244a7f" font-size="27" font-weight="900">Current Plan</text>
    <text x="156" y="292" fill="#10213a" font-size="20">✓ Confirm location</text>
    <text x="156" y="340" fill="#10213a" font-size="20">✓ Confirm telescope and accessories</text>
    <text x="156" y="388" fill="#10213a" font-size="20">✓ Confirm target order and times</text>
    <text x="156" y="436" fill="#10213a" font-size="20">✓ Save notes for the session</text>
    <rect x="156" y="520" width="190" height="54" rx="10" fill="#ffdc55"/><text x="251" y="554" text-anchor="middle" fill="#10213a" font-size="20" font-weight="900">Save Plan</text>
    <rect x="666" y="188" width="470" height="450" rx="18" fill="#fff8da" stroke="#e9c95f"/>
    <text x="696" y="238" fill="#986f00" font-size="27" font-weight="900">Output Actions</text>
    <rect x="696" y="292" width="280" height="54" rx="10" fill="#1f5fbf"/><text x="836" y="326" text-anchor="middle" fill="#fff" font-size="20" font-weight="900">Print / PDF Report</text>
    <rect x="696" y="376" width="280" height="54" rx="10" fill="#102b58"/><text x="836" y="410" text-anchor="middle" fill="#ffdc55" font-size="20" font-weight="900">Create Observation Log</text>
    <rect x="696" y="460" width="280" height="54" rx="10" fill="#fff" stroke="#e0c86a"/><text x="836" y="494" text-anchor="middle" fill="#10213a" font-size="20" font-weight="900">Send Feedback</text>
  </g>
</svg>
